<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — História da Arte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══ TELA INICIAL ══ -->
  <div id="inicio" class="tela ativa">
    <div class="inicio-header">
      <div class="mono-label">Coleção 2026 · Edição I</div>
      <h1 class="titulo-hero">História<br>da Arte</h1>
      <div class="linha-dourada"></div>
      <p class="subtitulo-hero">Selecione sua turma para iniciar a visita</p>
    </div>

    <div class="niveis-grid">
      <button class="nivel-card" data-nivel="6ano">
        <span class="nivel-num">6°</span>
        <span class="nivel-label">ano</span>
        <span class="nivel-desc">Arte Antiga e Medieval</span>
      </button>
      <button class="nivel-card" data-nivel="7ano">
        <span class="nivel-num">7°</span>
        <span class="nivel-label">ano</span>
        <span class="nivel-desc">Renascimento e Barroco</span>
      </button>
      <button class="nivel-card" data-nivel="8ano">
        <span class="nivel-num">8°</span>
        <span class="nivel-label">ano</span>
        <span class="nivel-desc">Romantismo e Impressionismo</span>
      </button>
      <button class="nivel-card" data-nivel="9ano">
        <span class="nivel-num">9°</span>
        <span class="nivel-label">ano</span>
        <span class="nivel-desc">Arte Moderna e Contemporânea</span>
      </button>
    </div>

    <p class="rodape-info">10 obras por visita · 20 segundos por questão</p>
  </div>

  <!-- ══ TELA QUIZ ══ -->
  <div id="quiz" class="tela">

    <div class="quiz-topo">
      <button class="btn-voltar" id="btn-voltar">← Sair</button>
      <div class="quiz-nivel-badge" id="quiz-nivel-badge"></div>
      <div class="quiz-pontos-wrap">
        <span class="quiz-pontos-label">Pontos</span>
        <span class="quiz-pontos-num" id="pontos-atual">0</span>
      </div>
    </div>

    <div class="quiz-progresso">
      <div class="progresso-fill" id="progresso-fill"></div>
    </div>

    <div class="quiz-body">

      <!-- Loading -->
      <div class="loading-box" id="loading">
        <span class="loading-icone">🖌️</span>
        <span class="loading-txt">Preparando as obras...</span>
      </div>

      <!-- Conteúdo -->
      <div id="conteudo-quiz" style="display:none">

        <div class="obra-wrap">
          <div class="obra-numero-wrap">
            <span class="obra-num" id="num-pergunta">01</span>
            <span class="obra-de">/ <span id="total-perguntas">10</span></span>
          </div>

          <!-- Imagem da obra -->
          <div class="obra-imagem-wrap" id="obra-imagem-wrap">
            <img id="obra-imagem" src="" alt="Obra de arte" loading="lazy">
            <div class="obra-imagem-placeholder" id="obra-placeholder">🖼️</div>
          </div>

          <!-- Timer -->
          <div class="timer-row">
            <div class="timer-track">
              <div class="timer-fill" id="timer-fill"></div>
            </div>
            <span class="timer-num" id="timer">20</span>
          </div>

          <!-- Tags -->
          <div class="pergunta-meta">
            <span class="tag tag-categoria" id="tag-categoria"></span>
            <span class="tag" id="tag-dificuldade"></span>
          </div>

          <!-- Enunciado -->
          <p class="enunciado" id="enunciado"></p>
        </div>

        <!-- Alternativas -->
        <div class="alternativas-grid" id="alternativas"></div>

      </div>
    </div>
  </div>

  <!-- ══ TELA RESULTADO ══ -->
  <div id="resultado" class="tela">
    <div class="resultado-card">
      <span class="res-emoji" id="res-emoji">🏛️</span>
      <div class="mono-label" style="margin-bottom:0.5rem">Resultado da visita</div>
      <div class="nivel-badge-res" id="nivel-badge-res"></div>

      <div class="res-divisor"></div>

      <div class="res-placar">
        <span id="res-pontos">0</span>
        <span class="res-placar-den">/ <span id="res-total">10</span></span>
      </div>
      <div class="res-pct" id="res-pct"></div>

      <div class="res-divisor"></div>

      <p class="res-msg" id="res-msg"></p>

      <div class="btns-resultado">
        <button class="btn-primary" id="btn-jogar-novamente">
          Nova Visita — mesma turma
        </button>
        <button class="btn-secondary" id="btn-menu">
          Escolher outra turma
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>

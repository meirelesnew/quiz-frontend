<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — História da Arte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══ TELA INICIAL ══ -->
  <div id="inicio" class="tela" style="display:flex">

    <div class="galeria-header">
      <div class="numero-edicao">Coleção 2026 &nbsp;·&nbsp; Edição I</div>
      <span class="titulo-principal">História<br>da Arte</span>
      <span class="titulo-linha"></span>
      <p class="subtitulo">Um percurso pelos grandes movimentos e obras</p>
    </div>

    <div class="moldura">
      <div class="catalogo-info">
        <div class="catalogo-item">
          <span class="catalogo-numero">50</span>
          <span class="catalogo-label">Obras no acervo</span>
        </div>
        <div class="catalogo-item">
          <span class="catalogo-numero">10</span>
          <span class="catalogo-label">Por visita</span>
        </div>
        <div class="catalogo-item">
          <span class="catalogo-numero">20s</span>
          <span class="catalogo-label">Por obra</span>
        </div>
      </div>

      <button class="btn-iniciar" id="btn-iniciar">
        <span class="btn-iniciar-texto">Iniciar a Visita</span>
      </button>
      <button class="btn-secundario" id="btn-como-funciona">
        Como funciona o quiz?
      </button>
    </div>

  </div>

  <!-- ══ TELA QUIZ ══ -->
  <div id="quiz" class="tela">
    <div class="quiz-wrapper">

      <div class="quiz-topo">
        <div>
          <span class="quiz-numero-grande" id="num-pergunta">01</span>
          <span class="quiz-de">/ <span id="total-perguntas">10</span></span>
        </div>
        <div class="quiz-pontos-wrap">
          <span class="quiz-pontos-label">Pontuação</span>
          <span class="quiz-pontos-num" id="pontos-atual">0</span>
        </div>
      </div>

      <div class="timer-row">
        <div class="timer-track">
          <div class="timer-fill" id="timer-fill"></div>
        </div>
        <span class="timer-label" id="timer">20</span>
      </div>

      <!-- Loading -->
      <div class="loading-box" id="loading">
        <span class="loading-icone">🖌️</span>
        <span class="loading-txt">Preparando as obras...</span>
      </div>

      <!-- Conteúdo -->
      <div id="conteudo-quiz" style="display:none">
        <div class="pergunta-card">
          <div class="pergunta-meta">
            <span class="tag tag-categoria" id="tag-categoria"></span>
            <span class="tag" id="tag-dificuldade"></span>
          </div>
          <p class="enunciado" id="enunciado"></p>
        </div>

        <div class="alternativas-grid" id="alternativas"></div>
      </div>

    </div>
  </div>

  <!-- ══ TELA RESULTADO ══ -->
  <div id="resultado" class="tela">
    <div class="resultado-moldura">
      <span class="res-emoji" id="res-emoji">🏛️</span>
      <span class="res-label">Resultado da visita</span>

      <div class="res-divisor"></div>

      <div class="res-placar">
        <span id="res-pontos">0</span><span> / <span id="res-total">10</span></span>
      </div>
      <div class="res-pct" id="res-pct"></div>

      <div class="res-divisor"></div>

      <p class="res-msg" id="res-msg"></p>

      <div class="btns-resultado">
        <button class="btn-iniciar" id="btn-jogar-novamente">
          <span class="btn-iniciar-texto">Nova Visita</span>
        </button>
        <button class="btn-secundario" id="btn-menu">Voltar ao saguão</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz – História da Arte</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══ TELA INICIAL ══ -->
  <div id="inicio" class="tela" style="display:flex">
    <div class="card">
      <div class="logo-museu">
        <span class="icone">🖼️</span>
        <h1>História da Arte</h1>
        <p>Quiz Interativo</p>
      </div>

      <div class="divisor"></div>

      <div class="stats-inicio">
        <div class="stat">
          <strong>50</strong>
          <span>Perguntas</span>
        </div>
        <div class="stat">
          <strong>10</strong>
          <span>Por rodada</span>
        </div>
        <div class="stat">
          <strong>20s</strong>
          <span>Por questão</span>
        </div>
      </div>

      <button class="btn" id="btn-iniciar">Iniciar Quiz</button>
    </div>
  </div>

  <!-- ══ TELA QUIZ ══ -->
  <div id="quiz" class="tela">
    <div class="card">

      <div class="quiz-header">
        <span>Questão <strong id="num-pergunta">1</strong> / <span id="total-perguntas">10</span></span>
        <span>Pontos: <strong id="pontos-atual">0</strong></span>
        <div class="timer-box" id="timer">20</div>
      </div>

      <div class="barra-wrap">
        <div id="barra-progresso"></div>
      </div>

      <!-- Loading -->
      <div id="loading" style="display:flex">
        <div class="spinner"></div>
        <span>Carregando perguntas...</span>
      </div>

      <!-- Conteúdo real -->
      <div id="conteudo-quiz" style="display:none">
        <div class="badges">
          <span class="badge badge-categoria" id="categoria-badge"></span>
          <span class="badge" id="dificuldade-badge"></span>
        </div>

        <div id="enunciado"></div>
        <div id="alternativas"></div>
      </div>

    </div>
  </div>

  <!-- ══ TELA RESULTADO ══ -->
  <div id="resultado" class="tela">
    <div class="card">
      <div class="resultado-centro">

        <span class="res-emoji" id="res-emoji">🏆</span>
        <h2 class="res-titulo">Resultado Final</h2>
        <p class="res-msg" id="res-msg"></p>

        <div class="divisor"></div>

        <div class="placar">
          <span class="placar-num" id="res-pontos">0</span>
          <span class="placar-den">/ <span id="res-total">10</span></span>
        </div>
        <p class="placar-pct" id="res-pct"></p>

        <button class="btn" id="btn-jogar-novamente">Jogar Novamente</button>
        <button class="btn btn-outline" id="btn-menu">Menu Inicial</button>

      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
